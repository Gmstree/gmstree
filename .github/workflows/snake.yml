name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *" # প্রতিদিন রাত ১২টায় রান হবে
  workflow_dispatch:
  push:
    branches:
    - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # ১. রিপোজিটরি চেকআউট
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. স্নেক জেনারেটর (3D ও 2D দুইটাই হবে)
      - name: Generate Snake Files
        uses: Platane/snk@v3
        with:
          github_user_name: gmstree
          outputs: |
            # ২ডি ডার্ক মোড এসভিজি
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#a78bfa
            # প্রিমিয়াম ৩ডি আইসোমেট্রিক জিআইএফ (অস্থির লাগবে এটা)
            dist/github-contribution-grid-snake-3d.gif?color_snake=#a78bfa&color_dots=#161b22,#392b5e,#5e479e,#7e57c2,#a78bfa

      # ৩. আউটপুট ব্রাঞ্চে পুশ করা
      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
