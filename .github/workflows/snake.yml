name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *" # প্রতিদিন রাত ১২টায় চলবে
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য
  push:
    branches:
    - main

# পারমিশন অ্যাড করা হয়েছে (এটি ছাড়া ফাইল পুশ হবে না)
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # ১. রিপোজিটরি চেকআউট করা
      - name: Checkout
        uses: actions/checkout@v4

      # ২. স্নেক অ্যানিমেশন জেনারেট করা
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: gmstree
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # ৩. আউটপুট ব্রাঞ্চে পুশ করা
      - name: Push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
