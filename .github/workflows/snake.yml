name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" # প্রতিদিন রাত ১২টায় অটো চলবে
  workflow_dispatch: # মেনুয়ালি রান করার জন্য
  push:
    branches:
    - main # মেইন ব্রাঞ্চে কিছু পুশ করলে রান হবে

permissions:
  contents: write # ফাইল রাইট করার পারমিশন (এটি মাস্ট)

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Snake Files
        uses: Platane/snk@v3
        with:
          github_user_name: gmstree
          outputs: |
            # তোমার picture ট্যাগের সাথে মিলিয়ে নামগুলো দেওয়া হলো
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#39d353

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output # তোমার picture ট্যাগের ব্রাঞ্চ
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
